# i3status configuration file.
# see "man i3status" for documentation.

# It is important that this file is edited as UTF-8.
# The following line should contain a sharp s:
# ß
# If the above line is not correctly displayed, fix your editor first!

# order += "ipv6"
# order += "wireless _first_"
# order += "ethernet _first_"
# order += "disk /"
# order += "load"
# order += "memory"
order += "tztime local"
order += "tztime ny"
order += "tztime denver"
order += "tztime date"
# order += "volume master"
order += "battery all"

general {
  markup = pango
  interval = 100
#   output_format = "i3bar"
  colors = true
  color_good = "#50FA7B"
  color_degraded = "#F1FA8C"
  color_bad = "#FF5555"
}

cpu_usage {
        format = "CPU %usage"
}

wireless _first_ {
        format_up = "W: (%quality at %essid) %ip"
        format_down = "W: down"
}

ethernet _first_ {
        format_up = "E: %ip (%speed)"
        format_down = "E: down"
}

disk "/" {
        format = "%avail"
}

load {
        format = "%1min"
}

memory {
        format = "%used | %available"
        threshold_degraded = "1G"
        format_degraded = "MEMORY < %available"
}

volume master {
    format = "<span background='#8be9fd' foreground='#282a36'> %volume </span>"
    format_muted = "<span background='#FF555' foreground='#282a36'> %volume </span>"
#     format_muted = "♪: muted (%volume)"
    device = "default"
    mixer = "Master"
    mixer_idx = 0
}

tztime date {
    format = "<span background='#ff79c6' foreground='#282a36'>%time</span>"
    format_time= " %d.%m.%Y "
}

tztime ny {
        format = "<span background='#50fa7b' foreground='#282a36'>%time</span>"
        format_time = " NYC: %H:%M "
        timezone = "America/New_York"
}

tztime denver {
        format = "<span background='#f1fa8c' foreground='#282a36'>%time</span>"
        format_time = " DEN: %H:%M "
        timezone = "America/Denver"
}

tztime local {
        format = "<span background='#bd93f9' foreground='#282a36'>%time</span>"
        format_time = " VNO: %H:%M "
        timezone = "Europe/Vilnius"
}

battery all {
        # format = "%status %percentage %remaining %emptytime"
        format = "<span background='#ffb86c' foreground='#282a36'> %status %percentage </span>"
        format_down = "No battery"
        last_full_capacity = true
        integer_battery_capacity = true
        # status_chr = ""
        status_chr = ""
        # status_bat = "bat"
        # status_bat = "☉"
        status_bat = ""
        # status_unk = "?"
        status_unk = ""
        # status_full = ""
        status_full = ""
        low_threshold = 15
        threshold_type = time
}